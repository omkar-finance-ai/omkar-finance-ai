name: Run Omkar Finance AI

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip uninstall -y fpdf || true
          pip install --upgrade pip
          pip install yfinance feedparser reportlab

      - name: Run script
        run: python finance_ai.py
